name: CI

on:
  push:
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts from previous build
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Rename artifacts to json_Gatchanko_Tool
        run: |
          mkdir renamed
          for f in artifacts/*/*.zip; do
            base=$(basename "$f")
            osname="${base%.*}"   # win-x64 / linux-x64 / osx-x64 など
            cp "$f" "renamed/json_Gatchanko_Tool-${osname}.zip"
          done

      - name: Create Release for existing tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0
          files: renamed/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
