    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            py: "3.11"
            suffix: linux
          - os: macos-latest
            py: "3.11"
            suffix: mac
          - os: windows-latest
            py: "3.11"
            suffix: win

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        run: |
          # Linux/Macでは拡張子なし、Windowsは .exe が自動で付く
          pyinstaller --onefile --name json_Gatchanko_Tool main.py

      - name: Zip artifact
        shell: bash
        run: |
          # distの中身を固める
          # -j オプションを入れると、zipの中に余計なフォルダ階層を作らずファイルを直下に入れます
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            # Windows(Git Bash環境)での圧縮
            7z a "json_Gatchanko_Tool-${{ matrix.suffix }}.zip" ./dist/*
          else
            # Linux/Macでの圧縮
            cd dist
            zip -r "../json_Gatchanko_Tool-${{ matrix.suffix }}.zip" .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: json_Gatchanko_Tool-${{ matrix.suffix }}.zip
